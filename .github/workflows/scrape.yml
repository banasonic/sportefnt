name: Sport Events Scraper (JSON Only)

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      # تحميل الكود
      - uses: actions/checkout@v4

      # Python
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # تثبيت المكتبات
      - name: Install deps
        run: pip install playwright beautifulsoup4 requests lxml

      # تثبيت المتصفح
      - name: Install browser
        run: playwright install chromium --with-deps

      # تشغيل السكريبر
      - name: Run scraper
        run: |
          echo "🏆 بدء استخراج البيانات..."
          if [ -f src/advanced_scraper.py ]; then
            python src/advanced_scraper.py
          else
            python src/scraper.py
          fi

      # التحقق من JSON
      - name: Verify JSON
        run: |
          if [ -f output/matches.json ]; then
            echo "✅ JSON تم إنشاؤه"
            wc -c output/matches.json
          else
            echo "❌ لم يتم إنشاء JSON"
            exit 1
          fi

      # رفع الملف كـ Artifact
      - name: Upload JSON
        uses: actions/upload-artifact@v4
        with:
          name: matches-json
          path: output/matches.json
          retention-days: 7
