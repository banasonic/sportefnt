name: 🏆 Sport Events Scraper

on:
  schedule:
    - cron: '*/15 * * * *'

  workflow_dispatch:

  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install playwright beautifulsoup4 requests lxml

      - name: Install browser
        run: playwright install chromium --with-deps

      - name: Run scraper
        run: |
          if [ -f src/advanced_scraper.py ]; then
            python src/advanced_scraper.py
          else
            python src/scraper.py
          fi

      - name: Generate HTML
        run: |
          if [ -s output/matches.json ]; then
            python src/generate_html.py
          fi

      # ✅ الإصلاح هنا (بدون EOF)
      - name: Show results
        run: |
          if [ -f output/matches.json ]; then
            python3 -c "import json; d=json.load(open('output/matches.json')); \
print('⏰ الوقت:', d.get('timestamp','N/A')); \
print('📅 التاريخ:', d.get('date','N/A')); \
matches=d.get('matches',[]); \
print('🏟️ عدد المباريات:', len(matches)); \
[print(f\"• {m.get('home_team')} vs {m.get('away_team')} @ {m.get('time')}\") for m in matches[:5]]"
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: matches
          path: output/

  deploy:
    needs: scrape
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v4

      - name: Prepare
        run: |
          mkdir -p _site
          cp output/matches.json _site/ 2>/dev/null || echo '{}' > _site/matches.json
          cp output/index.html _site/ 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
